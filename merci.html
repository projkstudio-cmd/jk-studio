<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — JK.studio</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0a'/%3E%3Ctext x='50' y='62' font-family='Georgia,serif' font-size='44' fill='white' text-anchor='middle'%3EJK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1d2350;--card:#252b5e;--card-hover:#2c336c;
    --peach:#f8d8c6;--peach-soft:#fbe6da;--text:#c7cce4;--muted:#9298bd;
    --line:rgba(248,216,198,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--navy);color:var(--text);font-family:'Hanken Grotesk',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:28px;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;
  }
  body::before{
    content:"";position:absolute;top:-180px;right:-160px;width:560px;height:560px;
    background:radial-gradient(circle,rgba(248,216,198,.12),transparent 70%);pointer-events:none;
  }
  .box{max-width:520px;position:relative;z-index:1;opacity:0;transform:translateY(18px);animation:rise .7s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .check{
    width:74px;height:74px;border-radius:50%;background:rgba(123,220,160,.14);
    border:1px solid rgba(123,220,160,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 30px;
  }
  .check svg{width:34px;height:34px;stroke:#7bdca0;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  h1{font-family:'Playfair Display',serif;color:var(--peach);font-size:clamp(30px,6vw,46px);line-height:1.1;font-weight:600;margin-bottom:20px;letter-spacing:-.5px}
  p{font-size:18px;line-height:1.7;color:var(--text);margin-bottom:14px}
  .muted{color:var(--muted);font-size:15px;margin-bottom:34px}
  .btn{
    display:inline-block;background:var(--peach);color:var(--navy);font-weight:700;font-size:15px;
    padding:13px 26px;border-radius:8px;transition:transform .2s,background .2s;
  }
  .btn:hover{background:var(--peach-soft);transform:translateY(-1px)}
  a{text-decoration:none}
</style>
</head>
<body>
  <div class="box">
    <div class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>Merci, votre message est parti&nbsp;!</h1>
    <p>Je reviens vers vous très vite — généralement sous 24 à 48&nbsp;heures.</p>
    <p class="muted">À très bientôt,<br>Juliette — JK.studio</p>
    <a href="https://projkstudio-cmd.github.io/jk-studio/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
